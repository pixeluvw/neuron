name: neuron_cli
description: >-
  Powerful CLI for the Neuron framework. Generate projects, screens, controllers,
  models, services, widgets, middleware, and full-stack pages. Includes project
  health checks, smart renames, component listing, and dependency upgrades.
version: 1.1.0
homepage: https://github.com/pixeluvw/neuron
repository: https://github.com/pixeluvw/neuron/tree/main/packages/neuron_cli
topics:
  - cli
  - code-generation
  - flutter
  - neuron

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.2
  mason_logger: ^0.2.11
  path: ^1.8.3
  yaml: ^3.1.2
  recase: ^4.1.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0

executables:
  neuron:
